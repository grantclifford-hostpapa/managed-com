function loadState() {
  try {
    const raw = typeof localStorage !== 'undefined' && localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      const seed = SEED_STATE();
      setActiveTheme(seed.settings.theme || 'light');
      return seed;
    }
    const parsed = JSON.parse(raw);
    // Forward-compat: if seed has new keys, merge
    const merged = { ...SEED_STATE(), ...parsed };
    // Also merge nested settings so newly added settings (like theme) don't get lost
    merged.settings = { ...SEED_STATE().settings, ...(parsed.settings || {}) };
    setActiveTheme(merged.settings.theme || 'light');
    return merged;
  } catch (e) {
    return SEED_STATE();
  }
}

function saveState(s) {
  try {
    if (typeof localStorage !== 'undefined') localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
  } catch (e) { /* ignore */ }
}

// Pub-sub store
let _state = null;
const _listeners = new Set();
function getState() {
  if (_state === null) _state = loadState();
  return _state;
}
function setStoreState(updater) {
  const prev = getState();
  const next = typeof updater === 'function' ? updater(prev) : updater;
  if (next === prev) return;
  _state = next;
  saveState(_state);
  _listeners.forEach((fn) => fn());
}
function subscribe(fn) {
  _listeners.add(fn);
  return () => _listeners.delete(fn);
}

// Hook: subscribe to a slice. Selector should return a stable-equal value.
// Uses shallow equality (both arrays and plain objects) so selectors that
// return fresh references each call (e.g. `s => s.actions.slice(0, 6)` or
// `s => ({a: s.a, b: s.b})`) don't trigger React's infinite-loop
// "getSnapshot should be cached" warning.
function useStore(selector = (s) => s) {
  const sel = useRef(selector);
  sel.current = selector;
  const cached = useRef();
  const getSnapshot = () => {
    const next = sel.current(getState());
    const prev = cached.current;
    if (Object.is(prev, next)) return prev;

    // Both arrays — element-wise shallow compare
    if (Array.isArray(prev) && Array.isArray(next)) {
      if (prev.length === next.length && prev.every((v, i) => Object.is(v, next[i]))) {
        return prev;
      }
    }
    // Both plain objects — key-wise shallow compare
    else if (prev && next && typeof prev === 'object' && typeof next === 'object') {
      const nextKeys = Object.keys(next);
      const prevKeys = Object.keys(prev);
      if (nextKeys.length === prevKeys.length
          && nextKeys.every((k) => Object.is(next[k], prev[k]))) {
        return prev;
      }
    }
    cached.current = next;
    return next;
  };
  return useSyncExternalStore(subscribe, getSnapshot, getSnapshot);
}

// ─── Action helpers (the 'reducers' / mutations) ─────────────────────
function nowHHMM() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
}
function uid(prefix) {
  return `${prefix}-${Math.random().toString(36).slice(2, 8)}`;
}

const actions = {
  resetDemo() {
    if (typeof localStorage !== 'undefined') localStorage.removeItem(STORAGE_KEY);
    _state = SEED_STATE();
    _listeners.forEach((fn) => fn());
  },

  pushToast(toast) {
    const t = { id: uid('t'), ...toast };
    setStoreState((s) => ({ ...s, toasts: [...s.toasts, t] }));
    setTimeout(() => {
      setStoreState((s) => ({ ...s, toasts: s.toasts.filter((x) => x.id !== t.id) }));
    }, toast.duration || 4500);
  },

  // Agent approvals
  approveApproval(id) {
    setStoreState((s) => {
      const a = s.approvals.find((x) => x.id === id);
      if (!a) return s;
      const newAction = {
        time: nowHHMM(),
        cat: a.kind === 'security' ? 'Security' : 'Scale',
        what: a.title,
        why: a.reason,
        delta: a.delta === 'no cost' ? '—' : a.delta,
        confirm: 'You approved',
      };
      return {
        ...s,
        approvals: s.approvals.filter((x) => x.id !== id),
        actions: [newAction, ...s.actions],
        actionsToday: s.actionsToday + 1,
      };
    });
    actions.pushToast({ kind: 'ok', message: 'Approved. Agent is applying.' });
  },
  skipApproval(id) {
    setStoreState((s) => ({ ...s, approvals: s.approvals.filter((x) => x.id !== id) }));
    actions.pushToast({ kind: 'info', message: 'Skipped this time. Agent will re-evaluate later.' });
  },

      ...s,
      vms: s.vms.map((v) => v.id === id ? { ...v, status: v.status === 'Running' ? 'Stopped' : 'Running', cost: v.status === 'Running' ? 0 : v.cost || 48 } : v),

      dbs: [...s.dbs, placeholder],

  resetVibe() {
    const newName = `marketplace-${Math.random().toString(36).slice(2, 4)}${Math.floor(Math.random() * 90 + 10)}`;
    setStoreState((s) => ({
      ...s,
      vibe: { ...SEED_STATE().vibe, appName: newName, deployStep: 0, connected: false, spendUsed: 0, requestPending: false, activityLog: [] },
    }));
  },
  advanceVibeStep() {
    setStoreState((s) => {
      if (s.vibe.deployStep >= 8) return s;
      const nextStep = s.vibe.deployStep + 1;
      const nextLog = [...s.vibe.activityLog];
      // Add a log entry on completion (step 6 = web live, 8 = mobile queued)
      if (nextStep === 6) {
        nextLog.unshift({ time: nowHHMM(), text: `Web app deployed at ${s.vibe.appName}.managed.app.`, tag: 'agent' });
      }
      return { ...s, vibe: { ...s.vibe, deployStep: nextStep, activityLog: nextLog, spendUsed: nextStep === 8 ? 0.04 : s.vibe.spendUsed } };
    });
  },
  approveVibeRequest() {
    setStoreState((s) => ({
      ...s,
      vibe: {
        ...s.vibe,
        requestPending: false,
        activityLog: [{ time: nowHHMM(), text: `Scaled DB to Standard. Cost +$8/mo.`, tag: 'auto' }, ...s.vibe.activityLog],
      },
    }));
    actions.pushToast({ kind: 'ok', message: 'Approved. DB scaling now.' });
  },

  // Agent timer tick — fires a synthetic action every 30s
  agentTick() {
    const ideas = [
      { cat: 'Cost', what: 'Compressed log bucket cold tier', why: 'logs older than 30d moved to cold storage.', delta: '−$2/mo' },
      { cat: 'Scale', what: 'Scaled api-gateway down off-peak', why: 'Traffic dropped 60% in last 30m.', delta: '−$4/mo' },
      { cat: 'Reliability', what: 'Detected slow query on prod-db', why: 'SELECT FROM products took 412ms. Suggesting index.', delta: '—' },
      { cat: 'Security', what: 'Validated SSL chain on 6 domains', why: 'Weekly health check.', delta: '—' },
      { cat: 'Backup', what: 'Verified last 3 snapshots restorable', why: 'Quarterly DR test (synthetic restore in dev).', delta: '—' },
    ];
    const pick = ideas[Math.floor(Math.random() * ideas.length)];
    setStoreState((s) => {
      if (s.settings.agentPaused) return s;
      return {
        ...s,
        actions: [{ time: nowHHMM(), confirm: 'Auto', ...pick }, ...s.actions].slice(0, 50),
        actionsToday: s.actionsToday + 1,
      };
    });
  },

  toggleAgentPause() {
    setStoreState((s) => ({ ...s, settings: { ...s.settings, agentPaused: !s.settings.agentPaused } }));
  },

  setTheme(name) {
    setActiveTheme(name);
    setStoreState((s) => ({ ...s, settings: { ...s.settings, theme: name } }));
  },
  toggleTheme() {
    const current = getState().settings.theme || 'light';
    actions.setTheme(current === 'light' ? 'dark' : 'light');
  },

  // User prompts the agent directly
  askAgent(prompt) {
    const trimmed = (prompt || '').trim();
    if (!trimmed) return;
    setStoreState((s) => ({
      ...s,
      actions: [{
        time: nowHHMM(), cat: 'Request',
        what: `You asked: "${trimmed.length > 80 ? trimmed.slice(0, 80) + '…' : trimmed}"`,
        why: 'Agent received the request and is planning the steps. Will surface anything that needs your approval.',
        delta: '—', confirm: 'Working',
      }, ...s.actions].slice(0, 50),
      actionsToday: s.actionsToday + 1,
    }));
    actions.pushToast({ kind: 'ok', message: 'Agent received your request.' });
  },
};

// Simulated latency wrapper
function simulate(action, ms = 200) {
  return new Promise((res) => setTimeout(() => { action(); res(); }, ms));
}

// Brand tokens — from the managed.com Brand Identity Guide v1.0
// Two themes — both built from the official warm-grey ramp (Grey 05 → 100)
// plus the primary palette (Lightning Yellow, Chinese Black, White) and
// the secondary palette (Blue Azure, Medium Sea Green, Dark Pastel Red).
//
// Brand rule honoured here: yellow is NEVER used as a tint, accent border,
// or wash on a white background. The brand guide's three valid colorways
// are: yellow-on-black, black-on-white, white-on-black. So in light mode,
// `yellowSoft` and `yellowBorder` map to warm-grey neutrals — yellow only
// appears as full saturated fill on CTAs (with black text) or as a feature
// panel where the *whole panel* turns yellow with black content.
const THEMES = {
  dark: {
    canvas: '#161613',         // Grey 100 / Chinese Black
    surface: '#1F1F1B',        // between Grey 90/100
    card: '#2C2C25',           // Grey 90
    cardLift: '#424238',       // Grey 80
    border: '#3A3A30',         // between Grey 80/70
    borderStrong: '#59594A',   // Grey 70
    textBody: '#E4E4DD',       // Grey 10
    textMuted: '#ACAC9A',      // Grey 30
    textBright: '#F6F6F4',     // Grey 05

    yellowDim: '#B8CC00',
    onYellow: '#161613',       // Chinese Black — text on yellow fills (legacy alias of onCta)
    yellowSoft: 'rgba(229,255,0,0.10)',
    yellowBorder: 'rgba(229,255,0,0.35)',
    accentText: '#E5FF00',                // "agent active" indicator color

    // CTA — primary action button. Brand colorway 1 (yellow + black) on dark canvas.
    cta: '#E5FF00',                       // Lightning Yellow
    ctaHover: '#B8CC00',
    onCta: '#161613',                     // Chinese Black text on yellow
    // Logo mark — yellow on dark canvas per brand guide page 14
    markColor: '#E5FF00',
    // Indicator (progress bars, accent strips) — uses yellow on dark
    indicator: '#E5FF00',
    green: '#50AF5E',          // Medium Sea Green
    red: '#CF491E',            // Dark Pastel Red
    blue: '#5381CA',           // Blue Azure
  },
  light: {
    canvas: '#FFFFFF',         // White (primary palette)
    surface: '#F6F6F4',        // Grey 05
    card: '#FFFFFF',
    cardLift: '#E4E4DD',       // Grey 10
    border: '#E4E4DD',         // Grey 10
    borderStrong: '#BFBFB0',   // Grey 20
    textBody: '#2C2C25',       // Grey 90
    textMuted: '#85856F',      // Grey 50
    textBright: '#161613',     // Chinese Black
    yellow: '#E5FF00',         // Lightning Yellow stays defined but is NOT used in UI on white;
                                // reserved for full-yellow feature panels (entire surfaces) only.
    yellowDim: '#C8E000',
    onYellow: '#161613',       // legacy alias (text on full-yellow surfaces is black)
    yellowSoft: '#F6F6F4',     // Grey 05 — replaces yellow tint
    yellowBorder: '#BFBFB0',   // Grey 20 — replaces yellow border
    accentText: '#161613',     // Chinese Black for emphasis (was yellow on dark)
    accentBg: '#161613',
    accentBorder: '#161613',
    // Agent chip on light = Chinese Black background with Lightning Yellow text.
    // This IS brand-compliant: brand colorway 1 (yellow + black) at chip scale,
    // because the chip surface itself is black — yellow is not appearing on white.
    agentChipBg: '#161613',
    agentChipText: '#E5FF00',
    agentChipBorder: '#161613',
    // CTA — primary action button on light canvas. Brand colorway 3 (black + white).
    // Yellow CTAs on white are explicitly off-brand per the guide; use Chinese Black instead.
    cta: '#161613',                       // Chinese Black
    ctaHover: '#2C2C25',                  // Grey 90 (slightly lighter on hover)
    onCta: '#FFFFFF',                     // White text on black
    // Logo mark — black on white per brand guide page 14, colorway 3
    markColor: '#161613',
    // Indicator (progress bars, accent strips) — Chinese Black for high contrast on white
    indicator: '#161613',
    green: '#3F8E4D',
    red: '#B23C18',
    blue: '#3D67A8',
  },
};

// Theme is read at runtime from the store. `C` is now a thin proxy that
// resolves to the active theme for any given access — components read
// `C.canvas` etc. exactly as before. We keep a module-level reference that
// the App shell updates whenever the theme changes.
let _activeTheme = THEMES.light;
const C = new Proxy({}, {
  get(_, key) { return _activeTheme[key]; },
  has(_, key) { return key in _activeTheme; },
  ownKeys() { return Object.keys(_activeTheme); },
  getOwnPropertyDescriptor(_, key) {
    return { enumerable: true, configurable: true, value: _activeTheme[key] };
  },
});
function setActiveTheme(name) { _activeTheme = THEMES[name] || THEMES.light; }
const F = "'Inter','Avenir Next',system-ui,-apple-system,sans-serif";
const MONO = "ui-monospace,'SF Mono',Menlo,monospace";

function AgentView({ nav }) {

          <Sub>The agent runs alongside you. Watching, scaling, fixing — and asking when it must.</Sub>

        <SectionLabel>Ask the agent</SectionLabel>
        <div className="flex items-stretch gap-2 mt-2">
          <input
            value={prompt}
            onChange={(e) => setPrompt(e.target.value)}

          <button onClick={submitPrompt} disabled={!prompt.trim()}

// SCENE 5 — Billing
// ════════════════════════════════════════════════════════════════════════
function generateBilling() {
  const days = [];
  for (let i = 1; i <= 30; i++) {
    const t = i / 30, w = Math.sin(i / 4);
    days.push({ day: i, Apps: 24 + t * 6 + w * 3, VMs: 17 + t * 5 + Math.cos(i / 5) * 2, DBs: 15 + t * 3 + w * 1.5, Storage: 7 + t * 2, Mobile: i > 18 ? 4 + (i - 18) * 0.6 : 2, Sandboxes: 6 + Math.sin(i / 3) * 2.5 + t * 2 });
  }
  return days;
}

function Scene5({ setScene }) {
  const data = useMemo(() => generateBilling(), []);

                    <th key={h} style={{ textAlign: i >= 3 ? 'right' : 'left', padding: '8px 0', borderBottom: `1px solid ${C.border}`, fontWeight: 500 }}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {topTenants.map((t) => (
                    <tr key={t.name} style={{ color: C.textBody }}>
                      <td style={{ padding: '10px 0', borderBottom: `1px solid ${C.border}`, fontWeight: 500, color: C.textBright }}>{t.name}</td>
                      <td style={{ padding: '10px 0', borderBottom: `1px solid ${C.border}` }}>
                        <Tag k={t.motion === 'Channel' ? 'warn' : t.motion === 'Wholesale' ? 'ok' : t.motion === 'Cloud' ? 'info' : 'agent'}>{t.motion}</Tag>
                      </td>
                      <td style={{ padding: '10px 0', borderBottom: `1px solid ${C.border}`, color: C.textMuted, fontFamily: MONO, fontSize: 12 }}>{t.region}</td>
                      <td style={{ padding: '10px 0', borderBottom: `1px solid ${C.border}`, textAlign: 'right', fontFamily: MONO }}>${(t.mrr / 1000).toFixed(1)}k</td>
                      <td style={{ padding: '10px 0', borderBottom: `1px solid ${C.border}`, textAlign: 'right', fontSize: 12, color: t.growth === 'new' ? C.accentText : C.green, fontWeight: 600 }}>{t.growth}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </Card>
          </div>

          {/* RIGHT: Recent events + capacity + agent fleet */}
          <div className="space-y-5">
            <Card className="p-5">
              <SectionLabel>Recent events</SectionLabel>
              <div className="space-y-3 mt-3">
                {recentEvents.map((e, i) => (
                  <div key={i} className="flex items-start gap-2.5" style={{ fontSize: 12.5, color: C.textBody, lineHeight: 1.5, paddingBottom: i < recentEvents.length - 1 ? 10 : 0, borderBottom: i < recentEvents.length - 1 ? `1px solid ${C.border}` : 'none' }}>
                    <Dot k={e.tag === 'win' ? 'ok' : e.tag === 'watch' ? 'warn' : e.tag === 'good' ? 'ok' : 'info'} />
                    <div className="flex-1">
                      <div>{e.text}</div>
                      <div style={{ fontSize: 10.5, color: C.textMuted, marginTop: 3, letterSpacing: '0.04em', textTransform: 'uppercase' }}>{e.cat} · {e.time}</div>
                    </div>
                  </div>
                ))}
              </div>
            </Card>
          </div>
        </div>

        {/* Bottom row: Regional capacity + Agent fleet stats */}
        <div className="grid grid-cols-3 gap-5 mb-6">
          <Card className="p-5 col-span-2">
            <div className="flex items-center justify-between mb-4">
              <SectionLabel>Regional capacity · CloudStack + Ceph on owned infrastructure</SectionLabel>
              <span style={{ fontSize: 11, color: C.textMuted }}>4 regions · 1,240 hosts · 54% avg utilisation</span>
            </div>
            <div className="grid grid-cols-4 gap-3">
              {regions.map((r) => (
                <div key={r.code} className="p-3 rounded" style={{ backgroundColor: C.canvas, border: `1px solid ${C.border}` }}>
                  <div className="flex items-baseline justify-between">
                    <span style={{ fontSize: 14, fontWeight: 600, color: C.textBright }}>{r.code}</span>
                    <span style={{ fontSize: 10.5, color: C.textMuted }}>{r.name}</span>
                  </div>
                  <div className="mt-2.5 flex items-baseline gap-2">
                    <span style={{ fontSize: 22, fontWeight: 600, color: C.textBright, letterSpacing: '-0.02em' }}>{r.util}%</span>
                    <span style={{ fontSize: 10.5, color: C.textMuted }}>utilised</span>
                  </div>
                  <div className="mt-2 h-1 rounded-full overflow-hidden" style={{ backgroundColor: C.cardLift }}>
                    <div style={{ width: `${r.util}%`, height: '100%', backgroundColor: r.util > 75 ? C.red : r.util > 60 ? C.accentText : C.green }} />
                  </div>
                  <div className="flex items-center justify-between mt-2" style={{ fontSize: 10.5, color: C.textMuted }}>
                    <span>{r.hosts} hosts</span>
                    <span style={{ color: r.growth === 'fastest' ? C.accentText : C.textMuted, fontWeight: r.growth === 'fastest' ? 600 : 400 }}>{r.growth}</span>
                  </div>
                </div>
              ))}
            </div>
          </Card>

          <Card className="p-5" accent>
            <SectionLabel>Agent fleet · today</SectionLabel>
            <div className="space-y-3 mt-3">
              <div>
                <div className="flex items-baseline justify-between">
                  <span style={{ fontSize: 22, fontWeight: 600, color: C.accentText, letterSpacing: '-0.02em' }}>12,847</span>
                  <span style={{ fontSize: 10.5, color: C.textMuted, letterSpacing: '0.04em', textTransform: 'uppercase' }}>actions</span>
                </div>
                <div style={{ fontSize: 11, color: C.textMuted, marginTop: 1 }}>across all tenants · 94% auto-resolved</div>
              </div>
              <div className="pt-3" style={{ borderTop: `1px solid ${C.border}` }}>
                <div className="flex items-baseline justify-between">
                  <span style={{ fontSize: 22, fontWeight: 600, color: C.green, letterSpacing: '-0.02em' }}>$147k</span>
                  <span style={{ fontSize: 10.5, color: C.textMuted, letterSpacing: '0.04em', textTransform: 'uppercase' }}>saved</span>
                </div>
                <div style={{ fontSize: 11, color: C.textMuted, marginTop: 1 }}>in customer infra costs · this month aggregate</div>
              </div>
              <div className="pt-3" style={{ borderTop: `1px solid ${C.border}` }}>
                <div className="flex items-baseline justify-between">
                  <span style={{ fontSize: 22, fontWeight: 600, color: C.textBright, letterSpacing: '-0.02em' }}>12</span>
                  <span style={{ fontSize: 10.5, color: C.textMuted, letterSpacing: '0.04em', textTransform: 'uppercase' }}>escalations</span>
                </div>
                <div style={{ fontSize: 11, color: C.textMuted, marginTop: 1 }}>down from 31 last month · agent learning</div>
              </div>
            </div>
          </Card>
        </div>

        {/* Strategic note */}
        <Card className="p-6" accent>
          <div className="flex items-start gap-4">
            <div style={{ paddingTop: 4 }}><Mark size={20} /></div>
            <div className="flex-1">
              <div style={{ fontSize: 11, color: C.accentText, letterSpacing: '0.06em', textTransform: 'uppercase', fontWeight: 600 }}>Strategic note</div>
              <h3 style={{ fontSize: 18, fontWeight: 600, color: C.textBright, marginTop: 6, lineHeight: 1.4, letterSpacing: '-0.01em' }}>
                Four motions, one platform, one team — scaling without scaling headcount.
              </h3>
              <p style={{ fontSize: 13, color: C.textBody, marginTop: 8, lineHeight: 1.6 }}>
                Channel is now the fastest-growing motion at $278k MRR — driven by the Hostopia/CloudBlue partner network.
                Cloud remains the foundation. Wholesale is lumpy but high-margin. Vibe is the on-ramp that feeds Cloud.
                The agent fleet handles 94% of operational events autonomously — the reason this scales without proportional ops cost.
              </p>
            </div>
          </div>
        </Card>

        <div className="mt-8 flex justify-end">
          <PB onClick={() => setScene(8)}><span className="inline-flex items-center gap-2">See the unified bill <ArrowRight size={14} /></span></PB>
        </div>
      </div>
    </div>
  );
}


// ════════════════════════════════════════════════════════════════════════
// App shell
// ════════════════════════════════════════════════════════════════════════
function App() {
  const [scene, setScene] = useState(1);
  const autoTimer = useStore((s) => s.settings.autoTimer);
  const agentPaused = useStore((s) => s.settings.agentPaused);
  const theme = useStore((s) => s.settings.theme || 'light');

  // Activate the theme synchronously before children render their styles.
  // useMemo runs during render (not effect), so by the time descendants
  // read `C.canvas` etc., `_activeTheme` is already pointing at the right map.
  useMemo(() => { setActiveTheme(theme); }, [theme]);

  // Agent timer — fires a synthetic action roughly every 30s
  useEffect(() => {
    if (!autoTimer || agentPaused) return;
    const t = setInterval(() => actions.agentTick(), 30000);
    return () => clearInterval(t);
  }, [autoTimer, agentPaused]);

  const reset = () => {
    if (window.confirm('Reset the demo? This clears all created resources, approvals and the action log.')) {
      actions.resetDemo();
      actions.pushToast({ kind: 'info', message: 'Demo reset to seed data.' });
      setScene(1);
    }
  };

  return (
    <div className="min-h-screen" style={{ backgroundColor: C.canvas, color: C.textBody, fontFamily: F, WebkitFontSmoothing: 'antialiased' }}>
      <style>{`
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(4px) } to { opacity: 1; transform: translateY(0) } }
        @keyframes toastIn { from { transform: translateX(20px); opacity: 0 } to { transform: translateX(0); opacity: 1 } }
        @keyframes newPulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.5 } }
        @keyframes slideRight { from { transform: translateX(40px); opacity: 0 } to { transform: translateX(0); opacity: 1 } }
        @keyframes modalIn { from { transform: scale(0.97); opacity: 0 } to { transform: scale(1); opacity: 1 } }
      `}</style>
      <SceneNav scene={scene} setScene={setScene} onReset={reset} />
      {scene === 1 && <Scene1 setScene={setScene} />}
      {scene === 2 && <Scene2 setScene={setScene} />}
      {scene === 3 && <Scene3 setScene={setScene} />}
      {scene === 4 && <Scene4Cloud setScene={setScene} />}
      {scene === 5 && <Scene6 setScene={setScene} />}
      {scene === 6 && <Scene7 setScene={setScene} />}
      {scene === 7 && <ScenePlatformOps setScene={setScene} />}
      {scene === 8 && <Scene5 setScene={setScene} />}
      <ToastHost />
    </div>
  );
}


createRoot(document.getElementById('root')).render(<App />);

  </script>
</body>
</html>
