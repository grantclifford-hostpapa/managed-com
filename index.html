<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>managed.com · wireframe</title>
  <link rel="preconnect" href="https://esm.sh" crossorigin>
  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  <link rel="preconnect" href="https://unpkg.com" crossorigin>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html, body {
      background: #161613;
      color: #E4E4DD;
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    /* Loading state shown until React mounts */
    #loader {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      gap: 12px;
      background: #161613;
      color: #ACAC9A;
      font-size: 13px;
      letter-spacing: 0.04em;
      z-index: 1;
    }
    #loader .spin {
      width: 14px; height: 14px;
      border: 2px solid #3A3A30;
      border-top-color: #E5FF00;
      border-radius: 50%;
      animation: spin 700ms linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Hide loader once React renders something into #root */
    #root:not(:empty) ~ #loader { display: none; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "lucide-react": "https://esm.sh/lucide-react@0.383.0?deps=react@18.3.1",
      "recharts": "https://esm.sh/recharts@2.12.7?deps=react@18.3.1,react-dom@18.3.1"
    }
  }
  </script>

  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <div id="loader">
    <div class="spin"></div>
    <span>Compiling…</span>
  </div>

  <script type="text/babel" data-type="module" data-presets="react">

import React, { useState, useEffect, useMemo } from 'react';
import {
  Sparkles, Check, Loader2, Globe, Smartphone, X, Search, Plus, Bell,
  ChevronDown, ChevronRight, ChevronLeft, Server, Database, Box, Boxes, Rocket,
  HardDrive, Activity, Code2, Terminal, ExternalLink, ArrowRight,
  Download, Users, BookOpen, ShieldCheck, Network, BarChart3,
  Wallet, Key, Bot, MessageSquare, Building2, FileCode2,
  Filter, GitBranch, RefreshCw, AlertTriangle, Award, Palette, Briefcase,
  Megaphone, FileText,
} from 'lucide-react';
import {
  AreaChart, Area, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid,
} from 'recharts';
import { createRoot } from 'react-dom/client';

// Brand tokens — from the managed.com Brand Identity Guide v1.0
const C = {
  canvas: '#161613', surface: '#1F1F1B', card: '#2C2C25', cardLift: '#424238',
  border: '#3A3A30', borderStrong: '#59594A',
  textBody: '#E4E4DD', textMuted: '#ACAC9A', textBright: '#F6F6F4',
  yellow: '#E5FF00', yellowDim: '#B8CC00',
  yellowSoft: 'rgba(229,255,0,0.10)', yellowBorder: 'rgba(229,255,0,0.35)',
  green: '#50AF5E', red: '#CF491E', blue: '#5381CA',
};
const F = "'Inter','Avenir Next',system-ui,-apple-system,sans-serif";
const MONO = "ui-monospace,'SF Mono',Menlo,monospace";

// ─── Logomark ─────────────────────────────────────────────────────────
function Mark({ size = 22, color = C.yellow }) {
  return (
    <svg width={size * 1.15} height={size} viewBox="0 0 40 32" fill={color} style={{ flexShrink: 0 }}>
      <path d="M0 2 C 8 2, 14 7, 14 16 C 14 25, 8 30, 0 30 Z" />
      <path d="M14 4 C 22 4, 26 9, 26 16 C 26 23, 22 28, 14 28 Z" />
      <path d="M26 6 C 32 6, 34 10, 34 16 C 34 22, 32 26, 26 26 Z" />
    </svg>
  );
}
function Wordmark({ size = 18 }) {
  return (
    <div className="flex items-center gap-2" style={{ fontFamily: F }}>
      <Mark size={size} />
      <span style={{ fontSize: size * 0.95, fontWeight: 600, letterSpacing: '-0.01em', color: C.textBright }}>
        managed.com
      </span>
    </div>
  );
}

// ─── Reusable atoms ───────────────────────────────────────────────────
const Dot = ({ k = 'ok' }) => {
  const m = { ok: C.green, warn: C.yellow, error: C.red, idle: C.textMuted, info: C.blue };
  return <span style={{ display: 'inline-block', width: 8, height: 8, borderRadius: 999, backgroundColor: m[k] }} />;
};
const Status = ({ s }) => {
  const m = { Running: 'ok', Live: 'ok', Healthy: 'ok', Active: 'ok', Provisioning: 'warn', Building: 'warn', Updating: 'warn', Stopped: 'idle', Paused: 'idle', Failed: 'error' };
  return (
    <span className="inline-flex items-center gap-1.5" style={{ fontSize: 12, color: C.textBody }}>
      <Dot k={m[s] || 'idle'} />{s}
    </span>
  );
};
const Card = ({ children, className = '', accent, ...p }) => (
  <div className={`rounded-lg ${className}`} style={{ backgroundColor: C.card, border: `1px solid ${accent ? C.yellowBorder : C.border}` }} {...p}>{children}</div>
);
const PB = ({ children, onClick, size = 'md', full }) => {
  const sz = { sm: { p: '6px 14px', fs: 12.5 }, md: { p: '10px 20px', fs: 14 } }[size];
  return (
    <button onClick={onClick} className="rounded-md font-semibold transition-colors"
      style={{ backgroundColor: C.yellow, color: C.canvas, fontSize: sz.fs, padding: sz.p, width: full ? '100%' : 'auto' }}
      onMouseEnter={(e) => (e.currentTarget.style.backgroundColor = C.yellowDim)}
      onMouseLeave={(e) => (e.currentTarget.style.backgroundColor = C.yellow)}>
      {children}
    </button>
  );
};
const SB = ({ children, onClick, size = 'md' }) => {
  const sz = { sm: { p: '5px 12px', fs: 12.5 }, md: { p: '10px 20px', fs: 14 } }[size];
  return (
    <button onClick={onClick} className="rounded-md font-medium transition-colors"
      style={{ backgroundColor: 'transparent', color: C.textBright, border: `1px solid ${C.borderStrong}`, fontSize: sz.fs, padding: sz.p }}
      onMouseEnter={(e) => (e.currentTarget.style.backgroundColor = C.cardLift)}
      onMouseLeave={(e) => (e.currentTarget.style.backgroundColor = 'transparent')}>
      {children}
    </button>
  );
};
const Tag = ({ children, k = 'default' }) => {
  const s = { default: [C.cardLift, C.textBody], ok: ['rgba(80,175,94,0.15)', C.green], warn: [C.yellowSoft, C.yellow], info: ['rgba(83,129,202,0.15)', C.blue], agent: [C.yellowSoft, C.yellow], muted: ['transparent', C.textMuted] }[k];
  return <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded font-medium" style={{ backgroundColor: s[0], color: s[1], fontSize: 11 }}>{children}</span>;
};
const Eyebrow = ({ children, ic: Ic }) => (
  <div className="flex items-center gap-2" style={{ fontSize: 12, color: C.textMuted, letterSpacing: '0.06em', textTransform: 'uppercase' }}>
    {Ic && <Ic size={13} />}{children}
  </div>
);
const H1 = ({ children, size = 26 }) => (
  <h1 style={{ fontSize: size, fontWeight: 600, color: C.textBright, letterSpacing: '-0.02em', lineHeight: 1.1 }}>{children}</h1>
);
const Sub = ({ children }) => (
  <p style={{ fontSize: 13, color: C.textMuted, marginTop: 4 }}>{children}</p>
);
const SectionLabel = ({ children }) => (
  <div style={{ fontSize: 11, color: C.textMuted, letterSpacing: '0.06em', textTransform: 'uppercase', fontWeight: 600 }}>{children}</div>
);
const KV = ({ label, value, mono }) => (
  <div className="flex items-center justify-between py-2" style={{ borderBottom: `1px solid ${C.border}`, fontSize: 13 }}>
    <span style={{ color: C.textMuted }}>{label}</span>
    <span style={{ color: C.textBody, fontFamily: mono ? MONO : 'inherit' }}>{value}</span>
  </div>
);
const Spark = ({ data, color = C.yellow, w = 60, h = 18 }) => {
  const max = Math.max(...data), min = Math.min(...data), range = max - min || 1;
  const pts = data.map((v, i) => `${(i / (data.length - 1)) * w},${h - ((v - min) / range) * h}`).join(' ');
  return <svg width={w} height={h} style={{ overflow: 'visible' }}><polyline points={pts} fill="none" stroke={color} strokeWidth={1.5} strokeLinecap="round" /></svg>;
};
const FilterPill = ({ label, value, active }) => (
  <button className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded text-xs font-medium"
    style={{ backgroundColor: active ? C.yellowSoft : C.card, border: `1px solid ${active ? C.yellowBorder : C.border}`, color: active ? C.yellow : C.textBody }}>
    <span style={{ color: C.textMuted, fontWeight: 400 }}>{label}:</span>{value}
    <ChevronDown size={11} style={{ opacity: 0.5 }} />
  </button>
);
const Back = ({ onClick, label }) => (
  <button onClick={onClick} className="inline-flex items-center gap-1.5"
    style={{ fontSize: 12, color: C.textMuted, fontWeight: 500 }}>
    <ChevronLeft size={13} /> {label}
  </button>
);
const Tabs = ({ tabs, active, onChange }) => (
  <div className="flex items-center gap-0.5" style={{ borderBottom: `1px solid ${C.border}` }}>
    {tabs.map((t) => (
      <button key={t} onClick={() => onChange(t)} className="px-3.5 py-2.5 font-medium relative"
        style={{ color: active === t ? C.textBright : C.textMuted, fontSize: 13 }}>
        {t}
        {active === t && <span style={{ position: 'absolute', bottom: -1, left: 0, right: 0, height: 2, backgroundColor: C.yellow }} />}
      </button>
    ))}
  </div>
);

// Generic resource list table
function ResourceList({ title, sub, columns, rows, onCreate, createLabel, filters = [], agentNote }) {
  return (
    <div>
      <div className="flex items-start justify-between mb-5">
        <div><H1>{title}</H1>{sub && <Sub>{sub}</Sub>}</div>
        {onCreate && (
          <button onClick={onCreate} className="inline-flex items-center gap-1.5 px-3.5 py-2 rounded-md font-semibold"
            style={{ backgroundColor: C.yellow, color: C.canvas, fontSize: 13 }}>
            <Plus size={13} /> {createLabel}
          </button>
        )}
      </div>
      {agentNote && (
        <Card className="p-3.5 mb-4" accent>
          <div className="flex items-start gap-2.5">
            <Mark size={13} />
            <div>
              <div style={{ fontSize: 11, color: C.yellow, letterSpacing: '0.06em', textTransform: 'uppercase', fontWeight: 600 }}>Agent note</div>
              <div style={{ fontSize: 13, color: C.textBody, marginTop: 4, lineHeight: 1.5 }}>{agentNote}</div>
            </div>
          </div>
        </Card>
      )}
      {filters.length > 0 && (
        <div className="flex items-center gap-2 mb-4">
          <Filter size={13} style={{ color: C.textMuted }} />
          {filters.map((f, i) => <FilterPill key={i} {...f} />)}
          <div className="ml-auto flex items-center gap-2 px-2.5 py-1 rounded text-xs"
            style={{ backgroundColor: C.card, border: `1px solid ${C.border}`, color: C.textMuted, width: 220 }}>
            <Search size={11} /><span>Search…</span>
          </div>
        </div>
      )}
      <Card className="overflow-hidden">
        <table style={{ width: '100%', fontSize: 13 }}>
          <thead><tr style={{ backgroundColor: C.surface }}>
            {columns.map((c, i) => (
              <th key={i} style={{ textAlign: c.align || 'left', padding: '10px 14px', borderBottom: `1px solid ${C.border}`, fontSize: 11, color: C.textMuted, fontWeight: 500, letterSpacing: '0.04em', textTransform: 'uppercase' }}>{c.label}</th>
            ))}
          </tr></thead>
          <tbody>
            {rows.map((r, ri) => (
              <tr key={ri} onClick={r.onClick}
                style={{ cursor: r.onClick ? 'pointer' : 'default', borderBottom: ri < rows.length - 1 ? `1px solid ${C.border}` : 'none', color: C.textBody, transition: 'background-color 120ms' }}
                onMouseEnter={(e) => { if (r.onClick) e.currentTarget.style.backgroundColor = C.surface; }}
                onMouseLeave={(e) => { if (r.onClick) e.currentTarget.style.backgroundColor = 'transparent'; }}>
                {r.cells.map((c, ci) => (
                  <td key={ci} style={{ padding: '12px 14px', textAlign: columns[ci].align || 'left' }}>{c}</td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

// ─── Top scene navigator ──────────────────────────────────────────────
const SCENES = [
  { n: 1, l: 'Landing' }, { n: 2, l: 'Vibe' }, { n: 3, l: 'Vibe surface' },
  { n: 4, l: 'Cloud' }, { n: 5, l: 'Billing' }, { n: 6, l: 'Wholesale' }, { n: 7, l: 'Channel' },
];
function SceneNav({ scene, setScene, onReset }) {
  return (
    <div className="sticky top-0 z-50 flex items-center justify-between px-6 py-3 backdrop-blur-md"
      style={{ backgroundColor: 'rgba(22,22,19,0.85)', borderBottom: `1px solid ${C.border}` }}>
      <Wordmark size={18} />
      <div className="flex items-center gap-1">
        {SCENES.map(({ n, l }) => {
          const active = scene === n;
          return (
            <button key={n} onClick={() => setScene(n)} className="px-3 py-1.5 rounded-md text-xs font-medium transition-colors"
              style={{ backgroundColor: active ? C.yellow : 'transparent', color: active ? C.canvas : C.textMuted, fontFamily: F, letterSpacing: '0.02em' }}
              onMouseEnter={(e) => { if (!active) e.currentTarget.style.color = C.textBright; }}
              onMouseLeave={(e) => { if (!active) e.currentTarget.style.color = C.textMuted; }}>
              <span style={{ opacity: 0.6, marginRight: 6 }}>{n}</span>{l}
            </button>
          );
        })}
      </div>
      <button onClick={onReset} className="text-xs px-2 py-1" style={{ color: C.textMuted }}>Reset demo</button>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════════
// SCENE 1 — Landing
// ════════════════════════════════════════════════════════════════════════
function Scene1({ setScene }) {
  return (
    <div className="px-12 py-16" style={{ fontFamily: F }}>
      <div className="max-w-6xl mx-auto">
        <Eyebrow ic={Mark}>The hosting cloud for the AI-native era</Eyebrow>
        <h1 style={{ fontSize: 88, fontWeight: 600, lineHeight: 1.02, letterSpacing: '-0.03em', color: C.textBright, marginTop: 32, maxWidth: 1100 }}>
          Vibe code anything.<br />Deploy everywhere.<br />
          Managed by <span style={{ color: C.yellow, fontStyle: 'italic' }}>AI</span>.
        </h1>
        <p className="mt-8 max-w-2xl" style={{ fontSize: 20, color: C.textMuted, lineHeight: 1.5 }}>
          Two front doors. One platform. The agent runs alongside you — or for you.
        </p>
        <div className="mt-10 flex items-center gap-4">
          <PB onClick={() => setScene(2)}>
            <span className="inline-flex items-center gap-2"><Sparkles size={16} /> Vibe — start with a prompt</span>
          </PB>
          <SB onClick={() => setScene(4)}>
            <span className="inline-flex items-center gap-2"><Server size={16} /> Cloud — give me the menu</span>
          </SB>
        </div>

        <div className="mt-16 p-8 rounded-2xl" style={{ backgroundColor: C.card, border: `1px solid ${C.border}` }}>
          <div className="flex items-stretch gap-6">
            {[
              { ic: MessageSquare, label: 'Prompt', body: '"Build me a marketplace app with auth, payments, and an admin panel."', sub: 'Claude Code · Cursor · Lovable · Bolt' },
              { ic: Mark, label: 'Connector', body: 'managed.com MCP server — one auth, then the agent does the rest.', sub: 'Provisions · scales · asks only when it must', accent: true },
              { ic: Rocket, label: 'Live everywhere', surfaces: true },
            ].map((s, i) => (
              <React.Fragment key={i}>
                <div className="flex-1 p-5 rounded-lg"
                  style={{ backgroundColor: s.accent ? C.canvas : C.surface, border: `1px solid ${s.accent ? C.yellowBorder : C.border}` }}>
                  <Eyebrow ic={s.ic}>{s.label}</Eyebrow>
                  {s.surfaces ? (
                    <div className="space-y-2 mt-3">
                      {[['Web', 'yourdomain.com · SSL · CDN', Globe], ['iOS', 'App Store ready', Smartphone], ['Android', 'Play Store ready', Smartphone]].map(([t, sub, Ic]) => (
                        <div key={t} className="flex items-center gap-2" style={{ fontSize: 13 }}>
                          <Ic size={13} style={{ color: C.textMuted }} />
                          <span style={{ color: C.textBody, fontWeight: 500 }}>{t}</span>
                          <span style={{ color: C.textMuted, fontSize: 11 }}>· {sub}</span>
                        </div>
                      ))}
                    </div>
                  ) : (
                    <>
                      <div style={{ fontSize: 14, color: s.accent ? C.textBright : C.textBody, lineHeight: 1.5, fontWeight: s.accent ? 500 : 400, marginTop: 12 }}>{s.body}</div>
                      <div className="mt-3" style={{ fontSize: 11, color: C.textMuted }}>{s.sub}</div>
                    </>
                  )}
                </div>
                {i < 2 && <div className="flex items-center" style={{ color: C.textMuted }}><ArrowRight size={20} /></div>}
              </React.Fragment>
            ))}
          </div>
        </div>

        <div className="mt-12 grid grid-cols-3 gap-4">
          {[
            { t: 'Composed full stack', b: 'Web, mobile, data, edge in one place. Single primitives still need stitching.', I: Boxes },
            { t: 'Sovereign infra', b: 'Canadian-owned data centres. Owned hardware. Not rented from a hyperscaler.', I: ShieldCheck },
            { t: 'Single bill', b: 'One vendor. One invoice. No reconciling 30 line items at month-end.', I: Wallet },
          ].map((t, i) => (
            <Card key={i} className="p-6">
              <t.I size={20} style={{ color: C.yellow }} />
              <h3 className="mt-4" style={{ fontSize: 18, fontWeight: 600, color: C.textBright }}>{t.t}</h3>
              <p className="mt-2" style={{ fontSize: 14, lineHeight: 1.55, color: C.textMuted }}>{t.b}</p>
            </Card>
          ))}
        </div>

        <div className="mt-16 pt-8" style={{ borderTop: `1px solid ${C.border}` }}>
          <div style={{ fontSize: 11, color: C.textMuted, letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 12 }}>AI builders we plug into</div>
          <div className="flex items-center gap-8 flex-wrap" style={{ color: C.textBody, fontSize: 16, fontWeight: 500 }}>
            {['Claude Code', 'Cursor', 'Lovable', 'Bolt', 'Cline', 'Windsurf'].map((n) => <span key={n} style={{ opacity: 0.7 }}>{n}</span>)}
          </div>
        </div>

        <div className="mt-12 flex items-center justify-between" style={{ borderTop: `1px solid ${C.border}`, paddingTop: 24 }}>
          <div style={{ fontSize: 12, color: C.textMuted }}>© 2026 managed.com — a HostPapa company</div>
          <div className="flex items-center gap-4">
            <button onClick={() => setScene(6)} className="text-xs flex items-center gap-1.5" style={{ color: C.textMuted }}>ISV partners <ArrowRight size={11} /></button>
            <button onClick={() => setScene(7)} className="text-xs flex items-center gap-1.5" style={{ color: C.textMuted }}>Telco / MSP channel <ArrowRight size={11} /></button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════════
// SCENE 2 — Vibe
// ════════════════════════════════════════════════════════════════════════
const BUILD_LOG = [
  { k: 'done', t: 'Provisioning Application Platform instance (LAX)' },
  { k: 'done', t: 'Provisioning Postgres database' },
  { k: 'done', t: 'Wiring environment variables and secrets' },
  { k: 'done', t: 'Registering domain marketplace-q7.managed.app' },
  { k: 'done', t: 'Issuing SSL certificate' },
  { k: 'done', t: 'Web app live → marketplace-q7.managed.app' },
  { k: 'run', t: 'iOS build running — App Store submission queued' },
  { k: 'run', t: 'Android build running — Play Store submission queued' },
];

function Scene2({ vibeKey, setScene }) {
  const [modal, setModal] = useState(false);
  const [conn, setConn] = useState(false);
  const [step, setStep] = useState(0);
  useEffect(() => { setModal(false); setConn(false); setStep(0); }, [vibeKey]);
  useEffect(() => {
    if (conn && step < BUILD_LOG.length) { const t = setTimeout(() => setStep(step + 1), 650); return () => clearTimeout(t); }
  }, [conn, step]);

  return (
    <div className="px-8 py-8" style={{ fontFamily: F }}>
      <div className="rounded-xl overflow-hidden" style={{ backgroundColor: C.card, border: `1px solid ${C.border}` }}>
        <div className="flex items-center justify-between px-4 py-2.5" style={{ backgroundColor: C.canvas, borderBottom: `1px solid ${C.border}` }}>
          <div className="flex items-center gap-1.5">
            {['#ff5f57', '#febc2e', '#28c840'].map((c) => <span key={c} style={{ width: 11, height: 11, borderRadius: 999, backgroundColor: c }} />)}
            <span className="ml-3" style={{ fontSize: 12, color: C.textMuted }}>marketplace-q7 — Claude Code</span>
          </div>
          <div style={{ fontSize: 11, color: C.textMuted }}>main · synced</div>
        </div>

        <div className="grid grid-cols-12" style={{ minHeight: 540 }}>
          {/* Chat */}
          <div className="col-span-4 p-5 flex flex-col" style={{ borderRight: `1px solid ${C.border}`, backgroundColor: C.canvas }}>
            <Eyebrow ic={Bot}>Agent</Eyebrow>
            <div className="space-y-3 flex-1 mt-4 overflow-y-auto" style={{ fontSize: 13.5, lineHeight: 1.55 }}>
              {[
                { who: 'You', txt: 'Build me a marketplace app with auth, payments, and an admin panel.' },
                { who: 'Agent', txt: <>Working code in 90 seconds…<br /><span style={{ color: C.green }}>✓ Built.</span> Want to deploy this?</> },
                { who: 'You', txt: 'Yes — deploy it.' },
                ...(conn
                  ? [{ who: 'Agent', txt: "Deploying now. I'll handle web, then mobile builds in parallel." }]
                  : [{ who: 'Agent', txt: "Got it. I'll need to connect to a hosting provider. Let me set up managed.com." }]
                ),
              ].map((m, i) => (
                <div key={i}>
                  <div className="flex items-center gap-1.5" style={{ fontSize: 10, color: m.who === 'Agent' ? C.yellow : C.textMuted, letterSpacing: '0.05em', textTransform: 'uppercase', marginBottom: 4 }}>
                    {m.who === 'Agent' && <Mark size={9} />} {m.who}
                  </div>
                  <div style={{ color: C.textBody }}>{m.txt}</div>
                </div>
              ))}
            </div>
            <div className="mt-4 px-3 py-2 rounded-md" style={{ backgroundColor: C.card, border: `1px solid ${C.border}`, fontSize: 13, color: C.textMuted }}>
              Ask the agent…
            </div>
          </div>

          {/* Terminal */}
          <div className="col-span-5 p-6 flex flex-col" style={{ backgroundColor: C.canvas }}>
            <Eyebrow ic={Terminal}>Deploy</Eyebrow>
            {!conn && (

function generateBilling() {
  const days = [];
  for (let i = 1; i <= 30; i++) {
    const t = i / 30, w = Math.sin(i / 4);
    days.push({ day: i, Apps: 24 + t * 6 + w * 3, VMs: 17 + t * 5 + Math.cos(i / 5) * 2, DBs: 15 + t * 3 + w * 1.5, Storage: 7 + t * 2, Mobile: i > 18 ? 4 + (i - 18) * 0.6 : 2, Sandboxes: 6 + Math.sin(i / 3) * 2.5 + t * 2 });
  }
  return days;
}

                        <div className="flex-1">
                          <div style={{ fontSize: 13, fontWeight: 600, color: C.textBright }}>{t[0]}</div>
                          <div style={{ fontSize: 11, color: C.textMuted }}>{t[1]}</div>
                        </div>
                        <div style={{ fontSize: 13, color: C.textBody, fontWeight: 600 }}>{t[2]} margin</div>
                        <Tag k={t[3] === 'Current' ? 'warn' : t[3] === 'Completed' ? 'ok' : 'muted'}>{t[3]}</Tag>
                      </div>
                    ))}
                  </div>
                </Card>
                <Card className="p-6">
                  <Eyebrow ic={FileText}>Sales enablement</Eyebrow>
                  <div className="mt-4 space-y-2">
                    {[
                      ['Pitch deck · SMB hosting bundle', 'PDF · Norwegian + English'],
                      ['One-pagers (3 SKU variants)', 'PDF · co-brandable'],
                      ['Battle cards vs. legacy hosts', 'PDF · gov.uk approved'],
                      ['Reference architecture diagrams', 'PDF · for technical sales'],
                      ['MDF / co-marketing program', 'Apply for Q3 funding'],
                    ].map((m) => (
                      <div key={m[0]} className="flex items-center gap-3 px-3 py-2.5 rounded" style={{ backgroundColor: C.canvas, border: `1px solid ${C.border}`, fontSize: 13 }}>
                        <FileText size={12} style={{ color: C.textMuted }} />
                        <span style={{ color: C.textBody, fontWeight: 500, flex: 1 }}>{m[0]}</span>
                        <span style={{ fontSize: 11, color: C.textMuted }}>{m[1]}</span>
                        <Download size={11} style={{ color: C.textMuted }} />
                      </div>
                    ))}
                  </div>
                  <div className="mt-5 pt-5" style={{ borderTop: `1px solid ${C.border}` }}>
                    <Eyebrow>CloudBlue marketplace</Eyebrow>
                    <p style={{ fontSize: 12.5, color: C.textBody, marginTop: 8, lineHeight: 1.55 }}>
                      Already on CloudBlue? Activate one-click integration to publish these SKUs into your CloudBlue catalog.
                    </p>
                    <SB size="sm">Connect CloudBlue</SB>
                  </div>
                </Card>
              </div>
            )}
          </div>

          {/* Closing card */}
          <Card className="mt-8 p-7" accent>
            <div className="flex items-start gap-5">
              <Mark size={36} />
              <div className="flex-1">
                <div style={{ fontSize: 11, color: C.yellow, letterSpacing: '0.08em', textTransform: 'uppercase', fontWeight: 600 }}>
                  Four ways to land
                </div>
                <h3 style={{ fontSize: 22, fontWeight: 600, color: C.textBright, marginTop: 6, letterSpacing: '-0.01em', lineHeight: 1.3 }}>
                  Direct Vibe. Direct Cloud. ISV wholesale. Telco / MSP channel.<br />
                  <span style={{ color: C.yellow }}>Same platform underneath.</span>
                </h3>
              </div>
              <button onClick={() => setScene(1)} className="px-4 py-2 rounded-md text-sm font-semibold inline-flex items-center gap-2 self-center"
                style={{ backgroundColor: C.canvas, color: C.textBright, border: `1px solid ${C.borderStrong}` }}>
                Back to start <ArrowRight size={13} />
              </button>
            </div>
          </Card>
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════════
// App shell
// ════════════════════════════════════════════════════════════════════════
function App() {
  const [scene, setScene] = useState(1);
  const [vibeKey, setVibeKey] = useState(0);
  const reset = () => { setVibeKey(vibeKey + 1); setScene(2); };
  return (
    <div className="min-h-screen" style={{ backgroundColor: C.canvas, color: C.textBody, fontFamily: F, WebkitFontSmoothing: 'antialiased' }}>
      <SceneNav scene={scene} setScene={setScene} onReset={reset} />
      {scene === 1 && <Scene1 setScene={setScene} />}
      {scene === 2 && <Scene2 vibeKey={vibeKey} setScene={setScene} />}
      {scene === 3 && <Scene3 setScene={setScene} />}
      {scene === 4 && <Scene4Cloud setScene={setScene} />}
      {scene === 5 && <Scene5 setScene={setScene} />}
      {scene === 6 && <Scene6 setScene={setScene} />}
      {scene === 7 && <Scene7 setScene={setScene} />}
    </div>
  );
}


createRoot(document.getElementById('root')).render(<App />);

  </script>
</body>
</html>
